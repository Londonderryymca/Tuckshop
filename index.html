<!DOCTYPE html>
<html>
<head>
    <title>Tuckshop POS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700&family=Hind+Guntur:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --brand-grey: #354348; --brand-green: #93c022; --brand-red: #e4012c; --background: #f8f9fa; }
        body { font-family: 'Hind Guntur', sans-serif; display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; background: var(--background); color: var(--brand-grey); }
        h2, h3, b, .btn, .cat-header { font-family: 'League Spartan', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; }
        .menu-container { flex: 2; min-width: 350px; }
        .cat-section { margin-bottom: 30px; }
        .cat-header { border-bottom: 2px solid var(--brand-grey); margin-bottom: 15px; padding-bottom: 5px; font-size: 1.2em; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        .item-card { background: white; padding: 12px; border-radius: 4px; text-align: center; cursor: pointer; border-bottom: 4px solid #ddd; transition: 0.1s; }
        .item-card:active { transform: translateY(2px); border-bottom: 0; }
        .item-img { width: 100%; height: 90px; object-fit: contain; margin-bottom: 8px; display: block; margin-left: auto; margin-right: auto; }
        .price-tag { color: var(--brand-green); font-weight: 600; }
        .receipt { flex: 1; min-width: 300px; background: white; padding: 25px; border-radius: 2px; border-top: 8px solid var(--brand-grey); box-shadow: 0 10px 20px rgba(0,0,0,0.05); height: fit-content; position: sticky; top: 20px; }
        .budget-box { background: #f0f0f0; padding: 15px; border-radius: 4px; margin-bottom: 15px; border-left: 4px solid var(--brand-grey); text-align: center; }
        .pos-input { width: 100px; padding: 8px; font-family: 'League Spartan'; border: 1px solid #ccc; font-size: 22px; text-align: center; border-radius: 4px; margin: 10px 0; }
        .remaining-box { margin-top: 10px; padding: 10px; border-radius: 4px; background: #fff; border: 1px solid #eee; }
        .remaining-val { font-weight: bold; font-size: 1.8em; color: var(--brand-green); display: block; }
        .over-budget { color: var(--brand-red) !important; }
        .cash-btns { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .cash-btn { background: var(--brand-grey); color: white; border: none; padding: 10px 2px; border-radius: 4px; cursor: pointer; font-size: 13px; font-family: 'League Spartan'; }
        .cash-btn:active { opacity: 0.8; }
        .btn { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; color: white; }
        .btn-next { background: var(--brand-green); font-size: 1.1em; }
        .btn-report { background: #555; margin-top: 30px; font-size: 12px; }
        .btn-clear { background: #ccc; color: #555; margin-top: 5px; font-size: 12px; }
        .cart-line { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f9f9f9; }
        .remove-btn { background: var(--brand-red); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; }
    </style>
</head>
<body>

<div class="menu-container" id="main-menu">Loading Tuckshop...</div>

<div class="receipt">
    <h2>Checkout</h2>
    
    <div class="budget-box">
        <b>Money Handed Over:</b><br>
        £<input type="number" step="0.10" value="2.00" class="pos-input" id="cash-input" oninput="updateCalculations()">
        <div class="cash-btns">
            <button class="cash-btn" onclick="setCash(0.5)">50p</button>
            <button class="cash-btn" onclick="setCash(1)">£1</button>
            <button class="cash-btn" onclick="setCash(2)">£2</button>
            <button class="cash-btn" onclick="setCash(5)">£5</button>
        </div>
        <div class="remaining-box">
            <span id="label-text">CHANGE / LEFT:</span>
            <span id="remaining-val" class="remaining-val">£2.00</span>
        </div>
    </div>

    <div id="cart-items"></div>

    <div style="border-top: 2px solid #eee; padding-top: 10px; display: flex; justify-content: space-between; align-items: baseline;">
        <h3>Total</h3><h2 id="total-display">£0.00</h2>
    </div>

    <button class="btn btn-next" onclick="completeSale()">NEXT CUSTOMER</button>
    <button class="btn btn-clear" onclick="resetCart()">CLEAR ALL</button>
    
    <button class="btn btn-report" onclick="downloadSalesReport()">📊 END DAY REPORT</button>
</div>

<script>
    let inventory = [];
    let cart = [];
    let sessionSales = [];
    const categories = ["Sweets", "Pick n Mix", "Drinks", "Crisps", "Other"];

    async function loadInventory() {
        try {
            const response = await fetch('products.json');
            inventory = await response.json();
            renderMenu();
        } catch (error) { document.getElementById('main-menu').innerText = "Error loading products."; }
    }

    function renderMenu() {
        const mainMenu = document.getElementById('main-menu');
        mainMenu.innerHTML = '';
        categories.forEach(cat => {
            const section = document.createElement('div');
            section.className = 'cat-section';
            section.innerHTML = `<div class="cat-header">${cat}</div>`;
            const grid = document.createElement('div');
            grid.className = 'grid';
            inventory.filter(i => i.category === cat).forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `<img src="${item.img}" class="item-img" onerror="this.src='https://placehold.co/100x100?text=Image'"><b>${item.name}</b><br><span class="price-tag">£${item.price.toFixed(2)}</span>`;
                card.onclick = () => addToCart(item);
                grid.appendChild(card);
            });
            section.appendChild(grid); mainMenu.appendChild(section);
        });
    }

    function addToCart(item) {
        cart.push({...item, cartId: Date.now() + Math.random()});
        updateCalculations();
    }

    function removeFromCart(cartId) {
        cart = cart.filter(i => i.cartId !== cartId);
        updateCalculations();
    }

    function setCash(amount) {
        document.getElementById('cash-input').value = amount.toFixed(2);
        updateCalculations();
    }

    function updateCalculations() {
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        const cashIn = parseFloat(document.getElementById('cash-input').value) || 0;
        const remaining = cashIn - total;

        document.getElementById('total-display').innerText = `£${total.toFixed(2)}`;
        
        const remDisplay = document.getElementById('remaining-val');
        const label = document.getElementById('label-text');
        
        remDisplay.innerText = `£${Math.abs(remaining).toFixed(2)}`;
        
        if (remaining < 0) {
            label.innerText = "OVER BUDGET BY:";
            remDisplay.className = 'remaining-val over-budget';
        } else {
            label.innerText = "CHANGE / LEFT:";
            remDisplay.className = 'remaining-val';
        }

        const cartDiv = document.getElementById('cart-items');
        cartDiv.innerHTML = '';
        cart.forEach(item => {
            const line = document.createElement('div');
            line.className = 'cart-line';
            line.innerHTML = `<span>${item.name}</span> <span>£${item.price.toFixed(2)} <button class="remove-btn" onclick="removeFromCart(${item.cartId})">✕</button></span>`;
            cartDiv.appendChild(line);
        });
    }

    function completeSale() {
        if(cart.length === 0) return;
        cart.forEach(item => { sessionSales.push({ name: item.name, price: item.price }); });
        resetCart();
    }

    function resetCart() { cart = []; updateCalculations(); }

    function downloadSalesReport() {
        if (sessionSales.length === 0) return alert("No sales recorded!");
        const totalMoney = sessionSales.reduce((sum, item) => sum + item.price, 0);
        const counts = {};
        sessionSales.forEach(item => { counts[item.name] = (counts[item.name] || 0) + 1; });
        let report = `TUCKSHOP SALES REPORT\n------------------------------\nTOTAL MONEY IN TIN: £${totalMoney.toFixed(2)}\nITEMS SOLD: ${sessionSales.length}\n------------------------------\n`;
        for (const [name, count] of Object.entries(counts)) { report += `${name}: ${count}\n`; }
        const blob = new Blob([report], { type: 'text/plain' });
        const anchor = document.createElement('a');
        anchor.download = `tuckshop-report.txt`;
        anchor.href = URL.createObjectURL(blob);
        anchor.click();
    }

    loadInventory();
</script>
</body>
</html>
