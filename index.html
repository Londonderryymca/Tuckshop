<!DOCTYPE html>
<html>
<head>
    <title>Tuckshop POS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700&family=Hind+Guntur:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --brand-grey: #354348; --brand-green: #93c022; --brand-red: #e4012c; --background: #f8f9fa; }
        body { font-family: 'Hind Guntur', sans-serif; display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; background: var(--background); color: var(--brand-grey); }
        h2, h3, b, .btn, .cat-header { font-family: 'League Spartan', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .menu-container { flex: 2; min-width: 350px; }
        .cat-section { margin-bottom: 30px; }
        .cat-header { border-bottom: 2px solid var(--brand-grey); margin-bottom: 15px; padding-bottom: 5px; color: var(--brand-grey); font-size: 1.2em; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        .item-card { background: white; padding: 12px; border-radius: 4px; text-align: center; cursor: pointer; border-bottom: 4px solid #ddd; transition: 0.1s; overflow: hidden; }
        .item-card:active { transform: translateY(2px); border-bottom: 0; }
        
        /* Photo Styling */
        .item-img { width: 100%; height: 80px; object-fit: contain; margin-bottom: 8px; font-size: 40px; display: flex; align-items: center; justify-content: center; }
        
        .price-tag { color: var(--brand-green); font-weight: 600; }
        .receipt { flex: 1; min-width: 300px; background: white; padding: 25px; border-radius: 2px; border-top: 8px solid var(--brand-grey); box-shadow: 0 10px 20px rgba(0,0,0,0.05); height: fit-content; position: sticky; top: 20px; }
        
        .budget-box { background: #f0f0f0; padding: 15px; border-radius: 4px; margin-bottom: 15px; border-left: 4px solid var(--brand-grey); }
        .budget-input { width: 70px; padding: 5px; font-family: 'League Spartan'; border: 1px solid #ccc; font-size: 16px; }
        .remaining { font-weight: bold; font-size: 1.3em; color: var(--brand-green); }
        .over-budget { color: var(--brand-red) !important; }

        .btn { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; color: white; }
        .btn-pay { background: var(--brand-green); }
        .btn-clear { background: #ccc; color: #555; margin-top: 5px; font-size: 12px; }
        .btn-report { background: var(--brand-grey); margin-top: 40px; }
        
        #cart-items { min-height: 50px; margin: 15px 0; border-top: 1px solid #eee; padding-top: 10px; }
        .cart-line { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #f9f9f9; }
        .remove-btn { background: var(--brand-red); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 12px; line-height: 1; }
        
        .out-of-stock { opacity: 0.3; grayscale: 1; pointer-events: none; }
    </style>
</head>
<body>

<div class="menu-container" id="menu-container">Loading Tuckshop...</div>

<div class="receipt">
    <h2>Customer Order</h2>
    
    <div class="budget-box">
        <span>Customer Budget: £</span>
        <input type="number" step="0.10" value="2.00" class="budget-input" id="budget-input" oninput="updateCalculations()">
        <div style="margin-top:8px;">Remaining: <span id="remaining-val" class="remaining">£2.00</span></div>
    </div>

    <div id="cart-items"></div>
    
    <div style="display:flex; justify-content: space-between; align-items: baseline; border-top: 2px solid #eee; padding-top: 10px;">
        <h3>Total To Pay</h3>
        <h2 id="total-display" style="color: var(--brand-grey);">£0.00</h2>
    </div>

    <button class="btn btn-pay" onclick="completeSale()">COMPLETE SALE</button>
    <button class="btn btn-clear" onclick="resetCart()">CANCEL ORDER</button>
    <button class="btn btn-report" onclick="downloadReport()">DOWNLOAD DAILY REPORT</button>
</div>

<script>
    let inventory = [];
    let sessionTotalSales = 0;
    let itemsSoldList = [];
    let cart = [];
    const categories = ["Sweets", "Drinks", "Crisps", "Other", "Pick n Mix"];

    async function loadInventory() {
        try {
            const response = await fetch('products.json');
            inventory = await response.json();
            renderMenu();
        } catch (error) {
            document.getElementById('menu-container').innerText = "Error loading products.json";
        }
    }

    function renderMenu() {
        const container = document.getElementById('menu-container');
        container.innerHTML = '';
        categories.forEach(cat => {
            const section = document.createElement('div');
            section.className = 'cat-section';
            section.innerHTML = `<div class="cat-header">${cat}</div>`;
            const grid = document.createElement('div');
            grid.className = 'grid';
            
            const catItems = inventory.filter(i => i.category === cat);
            catItems.forEach(item => {
                const card = document.createElement('div');
                card.className = `item-card ${item.stock <= 0 ? 'out-of-stock' : ''}`;
                
                // Check if img is a URL or an Emoji
                const isUrl = item.img.startsWith('http');
                const imgHtml = isUrl ? `<img src="${item.img}" class="item-img" alt="${item.name}">` : `<div class="item-img">${item.img}</div>`;

                card.innerHTML = `${imgHtml}
                                  <b>${item.name}</b><br>
                                  <span class="price-tag">£${item.price.toFixed(2)}</span><br>
                                  <small style="color: #999">Stock: ${item.stock}</small>`;
                card.onclick = () => addToCart(item);
                grid.appendChild(card);
            });
