<!DOCTYPE html>
<html>
<head>
    <title>Tuckshop POS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700&family=Hind+Guntur:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --brand-grey: #354348; --brand-green: #93c022; --brand-red: #e4012c; --background: #f8f9fa; }
        body { font-family: 'Hind Guntur', sans-serif; display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; background: var(--background); color: var(--brand-grey); }
        h2, h3, b, .btn, .cat-header { font-family: 'League Spartan', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; }
        .menu-container { flex: 2; min-width: 350px; }
        .cat-section { margin-bottom: 30px; }
        .cat-header { border-bottom: 2px solid var(--brand-grey); margin-bottom: 15px; padding-bottom: 5px; font-size: 1.2em; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        
        /* Item Card */
        .item-card { background: white; padding: 12px 12px 40px 12px; border-radius: 4px; text-align: center; cursor: pointer; border-bottom: 4px solid #ddd; transition: 0.1s; position: relative; overflow: hidden; }
        .item-card:active { transform: translateY(1px); }
        
        /* Count Badge */
        .count-badge { position: absolute; top: 5px; right: 5px; background: var(--brand-red); color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-family: 'League Spartan'; font-size: 16px; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 2; }
        
        /* Large Remove Button */
        .remove-label { position: absolute; bottom: 0; left: 0; right: 0; background: #e0e0e0; color: #555; font-family: 'League Spartan'; font-size: 13px; padding: 10px 0; border-top: 1px solid #ccc; font-weight: bold; transition: 0.1s; z-index: 3; }
        .remove-label:active { background: var(--brand-red); color: white; }

        .item-img { width: 100%; height: 80px; object-fit: contain; margin-bottom: 8px; display: block; margin-left: auto; margin-right: auto; }
        .price-tag { color: var(--brand-green); font-weight: 600; display: block; }
        
        .receipt { flex: 1; min-width: 300px; background: white; padding: 25px; border-radius: 2px; border-top: 8px solid var(--brand-grey); box-shadow: 0 10px 20px rgba(0,0,0,0.05); height: fit-content; position: sticky; top: 20px; }
        .status-box { padding: 15px; border-radius: 6px; text-align: center; margin-bottom: 15px; transition: 0.3s; border: 2px solid rgba(0,0,0,0.1); }
        .status-green { background-color: #d4edda; border-color: #c3e6cb; color: #155724; }
        .status-red { background-color: #f8d7da; border-color: #f5c6cb; color: #721c24; }
        
        .pos-input { width: 110px; padding: 8px; font-family: 'League Spartan'; border: 1px solid #ccc; font-size: 24px; text-align: center; border-radius: 4px; margin: 10px 0; }
        .remaining-val { font-weight: bold; font-size: 2.2em; display: block; }
        
        .cash-btns { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .cash-btn { background: var(--brand-grey); color: white; border: none; padding: 12px 2px; border-radius: 4px; cursor: pointer; font-size: 14px; font-family: 'League Spartan'; }
        
        .btn { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; color: white; }
        .btn-next { background: var(--brand-green); font-size: 1.2em; }
        .btn-report { background: #555; margin-top: 30px; font-size: 12px; }
        .btn-clear { background: #ccc; color: #555; margin-top: 5px; font-size: 12px; }
        
        .cart-line { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f9f9f9; }
        .remove-btn-small { background: var(--brand-red); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 14px; margin-left: 10px; }
        .summary-row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 5px; }
    </style>
</head>
<body>

<div id="main-menu" class="menu-container">Loading Tuckshop...</div>

<div class="receipt">
    <h2>Checkout</h2>
    <div id="display-box" class="status-box status-green">
        <b>Customer Money:</b><br>
        £<input type="number" step="0.10" value="0.00" class="pos-input" id="cash-input" oninput="updateCalculations()">
        <div class="cash-btns">
            <button class="cash-btn" onclick="setCash(0.5)">50p</button>
            <button class="cash-btn" onclick="setCash(1)">£1</button>
            <button class="cash-btn" onclick="setCash(1.5)">£1.50</button>
            <button class="cash-btn" onclick="setCash(2)">£2</button>
        </div>
        <hr style="margin: 15px 0; opacity: 0.2;">
        <span id="label-text" style="font-weight:600;">MONEY LEFT:</span>
        <span id="remaining-val" class="remaining-val">£0.00</span>
    </div>

    <div id="cart-items"></div>

    <div style="border-top: 2px solid #eee; padding-top: 10px;">
        <div class="summary-row"><span>Total Items:</span><h3 id="total-display">£0.00</h3></div>
        <div class="summary-row" style="color: var(--brand-green); font-weight: bold; border-top: 1px solid #f0f0f0; margin-top: 5px; padding-top: 5px;">
            <span>Change Due:</span><h3 id="change-summary">£0.00</h3>
        </div>
    </div>

    <button class="btn btn-next" onclick="completeSale()">NEXT CUSTOMER</button>
    <button class="btn btn-clear" onclick="resetCart()">CLEAR ALL</button>
    <button class="btn btn-report" onclick="downloadSalesReport()">📊 END DAY REPORT</button>
</div>

<script>
    let inventory = [];
    let cart = []; 
    let sessionSales = []; 
    const categories = ["Sweets", "Pick n Mix", "Drinks", "Crisps", "Other"];

    async function loadInventory() {
        try {
            const response = await fetch('products.json');
            inventory = await response.json();
            renderMenu();
        } catch (error) { document.getElementById('main-menu').innerText = "Error loading products."; }
    }

    function renderMenu() {
        const mainMenu = document.getElementById('main-menu');
        mainMenu.innerHTML = '';
        const counts = {};
        cart.forEach(name => counts[name] = (counts[name] || 0) + 1);

        categories.forEach(cat => {
            const catItems = inventory.filter(i => i.category === cat);
            if (catItems.length === 0) return;

            const section = document.createElement('div');
            section.className = 'cat-section';
            section.innerHTML = `<div class="cat-header">${cat}</div>`;
            const grid = document.createElement('div');
            grid.className = 'grid';

            catItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';
                const currentCount = counts[item.name] || 0;
                
                const countBadge = currentCount > 0 ? `<div class="count-badge">${currentCount}</div>` : '';
                const removeLabel = currentCount > 0 ? `<div class="remove-label" onclick="event.stopPropagation(); removeFromCart('${item.name}')">REMOVE ONE</div>` : '';
                
                card.innerHTML = `
                    ${countBadge}
                    <img src="${item.img}" class="item-img" onerror="this.src='https://placehold.co/100x100?text=Item'">
                    <b>${item.name}</b><br>
                    <span class="price-tag">£${item.price.toFixed(2)}</span>
                    ${removeLabel}
                `;
                card.onclick = () => addToCart(item.name);
                grid.appendChild(card);
            });
            section.appendChild(grid); mainMenu.appendChild(section);
        });
    }

    function addToCart(name) {
        cart.push(name);
        updateCalculations();
        renderMenu();
    }

    function removeFromCart(name) {
        const index = cart.lastIndexOf(name);
        if (index > -1) cart.splice(index, 1);
        updateCalculations();
        renderMenu();
    }

    function setCash(amount) {
        document.getElementById('cash-input').value = amount.toFixed(2);
        updateCalculations();
    }

    function updateCalculations() {
        let total = 0;
        const groupedCart = {};
        
        cart.forEach(name => {
            const item = inventory.find(i => i.name === name);
            if (item) {
                total += item.price;
                if (!groupedCart[name]) { groupedCart[name] = { price: item.price, count: 0 }; }
                groupedCart[name].count++;
            }
        });

        const cashIn = parseFloat(document.getElementById('cash-input').value) || 0;
        const remaining = cashIn - total;

        document.getElementById('total-display').innerText = `£${total.toFixed(2)}`;
        document.getElementById('change-summary').innerText = `£${Math.max(0, remaining).toFixed(2)}`;
        
        const remDisplay = document.getElementById('remaining-val');
        const label = document.getElementById('label-text');
        const displayBox = document.getElementById('display-box');
        
        remDisplay.innerText = `£${Math.abs(remaining).toFixed(2)}`;
        
        if (remaining < 0) {
            label.innerText = "OVER BUDGET BY:";
            displayBox.className = 'status-box status-red';
        } else {
            label.innerText = "MONEY LEFT:";
            displayBox.className = 'status-box status-green';
        }

        const cartDiv = document.getElementById('cart-items');
        cartDiv.innerHTML = '';
        for (const [name, data] of Object.entries(groupedCart)) {
            const line = document.createElement('div');
            line.className = 'cart-line';
            line.innerHTML = `
                <span><b>${data.count}x</b> ${name}</span>
                <span>£${(data.price * data.count).toFixed(2)} 
                <button class="remove-btn-small" onclick="removeFromCart('${name}')">✕</button></span>
            `;
            cartDiv.appendChild(line);
        }
    }

    function completeSale() {
        if(cart.length === 0) return;
        cart.forEach(name => {
            const item = inventory.find(i => i.name === name);
            sessionSales.push({ name: item.name, price: item.price });
        });
        resetCart();
    }

    function resetCart() { 
        cart = []; 
        document.getElementById('cash-input').value = "0.00";
        updateCalculations(); 
        renderMenu();
    }

    function downloadSalesReport() {
        if (sessionSales.length === 0) return alert("No sales recorded!");
        const totalMoney = sessionSales.reduce((sum, item) => sum + item.price, 0);
        const counts = {};
        sessionSales.forEach(item => { counts[item.name] = (counts[item.name] || 0) + 1; });
        let report = `TUCKSHOP SALES REPORT\n------------------------------\nTOTAL REVENUE: £${totalMoney.toFixed(2)}\nITEMS SOLD: ${sessionSales.length}\n------------------------------\n`;
        for (const [name, count] of Object.entries(counts)) { report += `${name}: ${count}\n`; }
        const blob = new Blob([report], { type: 'text/plain' });
        const anchor = document.createElement('a');
        anchor.download = `tuckshop-report.txt`;
        anchor.href = URL.createObjectURL(blob);
        anchor.click();
    }

    loadInventory();
</script>
</body>
</html>
